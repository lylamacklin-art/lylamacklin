<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lyla Macklin | Personal Blog</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="public-page">
    <main>
      <section class="public-hero" aria-label="Personal blog intro">
        <div class="public-nav">
          <a class="site-mark" href="./index.html" aria-label="Lyla Macklin home">LM</a>
          <div class="nav-links">
            <a class="back-link" href="#publicPostsTitle">Posts</a>
          </div>
        </div>

        <div class="public-hero-frame centered-hero-frame">
          <img class="headshot-photo hero-headshot" src="./assets/lyla-headshot.jpg" alt="Headshot of Lyla Macklin">
          <h1 id="publicName">Lyla Macklin</h1>
          <div class="title-rule" aria-hidden="true"></div>
          <p class="public-subtitle">personal thoughts / notes / experiences</p>
        </div>
      </section>

      <section class="public-posts-section" aria-labelledby="publicPostsTitle">
        <div class="public-section-heading">
          <div>
            <p class="section-kicker">Blog</p>
            <h2 id="publicPostsTitle">Latest posts</h2>
          </div>
          <span class="section-line" aria-hidden="true"></span>
        </div>
        <div id="publicPosts" class="reader-list"></div>
      </section>
    </main>

    <script src="./public-data.js"></script>
    <script src="./public.js"></script>
  </body>
</html>
